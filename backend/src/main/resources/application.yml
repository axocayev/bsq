server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: bsq-exam-portal
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bsq_exam}
    username: ${DB_USERNAME:bsq}
    password: ${DB_PASSWORD:bsq_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:bsq-exams}
  public-url: ${MINIO_PUBLIC_URL:http://localhost/storage}

jwt:
  secret: ${JWT_SECRET:YnNxX2V4YW1fcG9ydGFsX3N1cGVyX3NlY3JldF9rZXlfMzJieXRlcw==}
  access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MIN:60}
  refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  issuer: bsq-exam-portal

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5-20251001
  max-tokens: 4096
  base-url: https://api.anthropic.com

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    az.bsq: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
