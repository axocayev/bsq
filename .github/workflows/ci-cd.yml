name: CI/CD Pipeline - Build, Push & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ==================== BACKEND PIPELINE ====================

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4.3.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Compile and Build Backend
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon
          echo "✅ Backend built successfully"

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 1

  # ==================== FRONTEND PIPELINE ====================

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-cache-

      - name: Clean npm cache (if needed)
        run: npm cache clean --force 2>/dev/null || true

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Frontend Build Status
        run: echo "✅ Frontend built successfully"

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4.4.0
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ==================== BUILD DOCKER IMAGES ====================

  build-docker:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    name: Build Docker Images
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Build Backend Docker Image
        working-directory: ./backend
        run: |
          docker build \
            -t bsq-backend:${{ github.sha }} \
            -t bsq-backend:latest \
            .
          echo "✅ Backend image built"

      - name: Build Frontend Docker Image
        working-directory: ./frontend
        run: |
          docker build \
            -t bsq-frontend:${{ github.sha }} \
            -t bsq-frontend:latest \
            .
          echo "✅ Frontend image built"

      - name: Show Built Images
        run: docker images | grep bsq

  # ==================== PUSH TO DOCKER HUB ====================

  push-to-registry:
    needs: build-docker
    runs-on: ubuntu-latest
    name: Push to Docker Hub
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Debug - Print All Secrets
        run: |
          echo "========== SECRET NAMES =========="
          echo "DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}"
          echo "DOCKER_PAT is set: $([ -z '${{ secrets.DOCKER_PAT }}' ] && echo 'NO' || echo 'YES')"
          echo "DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}"
          echo "DEPLOY_USER: ${{ secrets.DEPLOY_USER }}"
          echo "DB_URL: ${{ secrets.DB_URL }}"
          echo "=================================="
          echo "Image will be tagged as:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/bsq-backend:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/bsq-frontend:latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5.4.0
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bsq-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/bsq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5.4.0
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bsq-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/bsq-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Hub Push Summary
        run: |
          echo "✅ Images pushed to Docker Hub:"
          echo "  • ${{ secrets.DOCKER_USERNAME }}/bsq-backend:latest"
          echo "  • ${{ secrets.DOCKER_USERNAME }}/bsq-backend:${{ github.sha }}"
          echo "  • ${{ secrets.DOCKER_USERNAME }}/bsq-frontend:latest"
          echo "  • ${{ secrets.DOCKER_USERNAME }}/bsq-frontend:${{ github.sha }}"

  # ==================== DEPLOYMENT ====================

  deploy:
    needs: push-to-registry
    runs-on: ubuntu-latest
    name: Deploy to Droplet
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Copy code to server
          scp -i ~/.ssh/deploy_key -r -o StrictHostKeyChecking=no backend $DEPLOY_USER@$DEPLOY_HOST:/root/bsq/
          scp -i ~/.ssh/deploy_key -r -o StrictHostKeyChecking=no frontend $DEPLOY_USER@$DEPLOY_HOST:/root/bsq/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no docker-compose.yml $DEPLOY_USER@$DEPLOY_HOST:/root/bsq/

          # Create .env file on remote with secrets from GitHub Secrets
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << ENVEOF
          cat > /root/bsq/.env << 'EOF'
          DB_URL=$DB_URL
          DB_USERNAME=$DB_USERNAME
          DB_PASSWORD=$DB_PASSWORD
          JWT_SECRET=$JWT_SECRET
          MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY
          MINIO_SECRET_KEY=$MINIO_SECRET_KEY
          CHATGPT_API_KEY=$CHATGPT_API_KEY
          CHATGPT_MODEL=gpt-4o-mini
          EOF
          chmod 600 /root/bsq/.env
          ENVEOF

          # Deploy with docker-compose (use pre-built images from Docker Hub)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << 'SSHEOF'
          cd /root/bsq
          docker-compose down
          docker pull $DOCKER_USERNAME/bsq-backend:latest
          docker pull $DOCKER_USERNAME/bsq-frontend:latest
          docker-compose up -d
          echo "✅ Services started"
          docker-compose ps
          SSHEOF

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          echo "Waiting for backend to be healthy..."
          for i in {1..30}; do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
              "curl -s http://localhost:8080/api/actuator/health | grep -q UP" 2>/dev/null; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "❌ Backend health check failed"
          exit 1

  # ==================== REPORT ====================

  report:
    needs: [test-backend, test-frontend, build-docker, push-to-registry, deploy]
    runs-on: ubuntu-latest
    if: always()
    name: Pipeline Report
    steps:
      - name: Build Summary
        run: |
          echo "=========================================="
          echo "   🔄 CI/CD PIPELINE REPORT"
          echo "=========================================="
          echo ""
          echo "📊 Stage Results:"
          echo "  • Backend Tests:    ${{ needs.test-backend.result }}"
          echo "  • Frontend Tests:   ${{ needs.test-frontend.result }}"
          echo "  • Docker Build:     ${{ needs.build-docker.result }}"
          echo "  • Push to Registry: ${{ needs.push-to-registry.result }}"
          echo "  • Deployment:       ${{ needs.deploy.result }}"
          echo ""

          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Pipeline PASSED"
            echo ""
            echo "🚀 Application Status:"
            echo "  Frontend:  http://${{ secrets.DEPLOY_HOST }}"
            echo "  Backend:   http://${{ secrets.DEPLOY_HOST }}:8080"
            echo ""
            echo "🐳 Docker Images:"
            echo "  Backend:  ${{ secrets.DOCKER_USERNAME }}/bsq-backend:latest"
            echo "  Frontend: ${{ secrets.DOCKER_USERNAME }}/bsq-frontend:latest"
            echo ""
            echo "📝 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "❌ Pipeline FAILED"
            echo ""
            echo "Please check the failed stage above for details."
            echo "📝 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi
          echo ""
          echo "=========================================="
