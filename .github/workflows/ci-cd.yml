# GitHub Actions CI/CD Pipeline
#
# Required GitHub Secrets:
#   - DOCKER_USERNAME: Docker Hub username (axocayev)
#   - DOCKER_PAT: Docker Hub Personal Access Token
#
# Set up secrets at: GitHub → Settings → Secrets and variables → Actions

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: axocayev
  IMAGE_NAME: bsq

jobs:
  # ==================== BACKEND PIPELINE ====================

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Compile and Build Backend
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon
          echo "✅ Backend built successfully"

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 1

  # ==================== FRONTEND PIPELINE ====================

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-cache-

      - name: Clean npm cache (if needed)
        run: npm cache clean --force 2>/dev/null || true

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Frontend Build Status
        run: echo "✅ Frontend built successfully"

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  build-docker:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    name: Build Docker Images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        working-directory: ./backend
        run: |
          docker build \
            -t bsq-backend:${{ github.sha }} \
            -t bsq-backend:latest \
            .
          echo "✅ Backend image built"

      - name: Build frontend Docker image
        working-directory: ./frontend
        run: |
          docker build \
            -t bsq-frontend:${{ github.sha }} \
            -t bsq-frontend:latest \
            .
          echo "✅ Frontend image built"

      - name: Show built images
        run: docker images | grep bsq

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    name: Deploy to DigitalOcean App Platform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get App ID
        id: app-id
        run: |
          APP_ID=$(doctl apps list --format id --no-header --name bsq-exam-portal)
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Update App deployment
        run: |
          doctl apps create-deployment \
            --app-id=${{ steps.app-id.outputs.app_id }} \
            --format id,status,phase \
            --no-header

      - name: Wait for deployment
        run: |
          DEPLOYMENT_ID=$(doctl apps list-deployments \
            --app-id=${{ steps.app-id.outputs.app_id }} \
            --format id --no-header --limit 1)

          for i in {1..60}; do
            STATUS=$(doctl apps get-deployment \
              --app-id=${{ steps.app-id.outputs.app_id }} \
              $DEPLOYMENT_ID \
              --format status --no-header)

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Deployment successful!"
              exit 0
            elif [ "$STATUS" = "ERROR" ]; then
              echo "Deployment failed!"
              exit 1
            fi

            echo "Waiting for deployment... ($i/60)"
            sleep 10
          done

          echo "Deployment timeout!"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Images Built and Pushed!"
          echo "Registry: Docker Hub"
          echo "Username: ${{ env.DOCKER_USERNAME }}"
          echo "Backend: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}"
          echo "Frontend: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}"

  # ==================== REPORT ====================

  report:
    needs: [test-backend, test-frontend, build-docker]
    runs-on: ubuntu-latest
    if: always()
    name: Pipeline Report
    steps:
      - name: Build Summary
        run: |
          echo "=========================================="
          echo "   🔄 CI/CD PIPELINE REPORT"
          echo "=========================================="
          echo ""
          echo "📊 Stage Results:"
          echo "  • Backend:    ${{ needs.test-backend.result }}"
          echo "  • Frontend:   ${{ needs.test-frontend.result }}"
          echo "  • Docker:     ${{ needs.build-docker.result }}"
          echo ""

          if [ "${{ needs.build-docker.result }}" = "success" ]; then
            echo "✅ Pipeline PASSED - Docker images built"
            echo ""
            echo "🐳 Next Steps (Optional):"
            echo "  1. Add Docker Hub secrets to GitHub"
            echo "     - DOCKER_USERNAME: axocayev"
            echo "     - DOCKER_PAT: (your-token)"
            echo "  2. Push images to Docker Hub in next workflow run"
          else
            echo "❌ Pipeline FAILED"
          fi
          echo ""
          echo "📝 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="
