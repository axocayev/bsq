name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ==================== BACKEND PIPELINE ====================

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Compile and Build Backend
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon
          echo "✅ Backend built successfully"

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 1

  # ==================== FRONTEND PIPELINE ====================

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-cache-

      - name: Clean npm cache (if needed)
        run: npm cache clean --force 2>/dev/null || true

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Lint Code
        working-directory: ./frontend
        run: npm run lint 2>/dev/null || echo "Lint warnings (non-blocking)"

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm run test -- --run

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ==================== BUILD DOCKER IMAGES ====================

  build-docker:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    name: Build Docker Images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        working-directory: ./backend
        run: |
          docker build \
            -t bsq-backend:${{ github.sha }} \
            -t bsq-backend:latest \
            .
          echo "✅ Backend image built"

      - name: Build Frontend Docker Image
        working-directory: ./frontend
        run: |
          docker build \
            -t bsq-frontend:${{ github.sha }} \
            -t bsq-frontend:latest \
            .
          echo "✅ Frontend image built"

      - name: Show Built Images
        run: docker images | grep bsq

  # ==================== DEPLOYMENT ====================

  deploy:
    needs: build-docker
    runs-on: ubuntu-latest
    name: Deploy to Droplet
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Copy code to server
          scp -i ~/.ssh/deploy_key -r -o StrictHostKeyChecking=no backend $DEPLOY_USER@$DEPLOY_HOST:/root/bsq/
          scp -i ~/.ssh/deploy_key -r -o StrictHostKeyChecking=no frontend $DEPLOY_USER@$DEPLOY_HOST:/root/bsq/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no docker-compose.yml $DEPLOY_USER@$DEPLOY_HOST:/root/bsq/

          # Create .env file on remote with secrets from GitHub Secrets
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cat > /root/bsq/.env << 'ENVEOF'
DB_URL=$DB_URL
DB_USERNAME=$DB_USERNAME
DB_PASSWORD=$DB_PASSWORD
JWT_SECRET=$JWT_SECRET
MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY
MINIO_SECRET_KEY=$MINIO_SECRET_KEY
CHATGPT_API_KEY=$CHATGPT_API_KEY
CHATGPT_MODEL=gpt-4o-mini
ENVEOF
chmod 600 /root/bsq/.env"

          # Deploy with docker-compose
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << 'SSHEOF'
          cd /root/bsq
          docker-compose down
          docker-compose build --no-cache backend frontend
          docker-compose up -d
          echo "✅ Services started"
          docker-compose ps
          SSHEOF

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          echo "Waiting for backend to be healthy..."
          for i in {1..30}; do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
              "curl -s http://localhost:8080/api/actuator/health | grep -q UP" 2>/dev/null; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "❌ Backend health check failed"
          exit 1

  # ==================== REPORT ====================

  report:
    needs: [test-backend, test-frontend, build-docker, deploy]
    runs-on: ubuntu-latest
    if: always()
    name: Pipeline Report
    steps:
      - name: Build Summary
        run: |
          echo "=========================================="
          echo "   🔄 CI/CD PIPELINE REPORT"
          echo "=========================================="
          echo ""
          echo "📊 Stage Results:"
          echo "  • Backend Tests:    ${{ needs.test-backend.result }}"
          echo "  • Frontend Tests:   ${{ needs.test-frontend.result }}"
          echo "  • Docker Build:     ${{ needs.build-docker.result }}"
          echo "  • Deployment:       ${{ needs.deploy.result }}"
          echo ""

          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Pipeline PASSED"
            echo ""
            echo "🚀 Application Status:"
            echo "  Frontend:  http://${{ secrets.DEPLOY_HOST }}"
            echo "  Backend:   http://${{ secrets.DEPLOY_HOST }}:8080"
            echo ""
            echo "📝 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "❌ Pipeline FAILED"
            echo ""
            echo "Please check the failed stage above for details."
            echo "📝 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi
          echo ""
          echo "=========================================="
